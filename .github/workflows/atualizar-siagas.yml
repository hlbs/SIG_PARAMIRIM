name: Atualizar detalhes SIAGAS

on:
  workflow_dispatch:
  schedule:
    - cron: "20 06 * * *"

permissions:
  contents: write

jobs:
  atualizar-detalhes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar raspagem dos detalhes
        env:
          SIAGAS_BASE_URL: "https://siagasweb.sgb.gov.br"
          SIAGAS_DETAIL_PATH: "layout/detalhe.php"
          SIAGAS_USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/131.0 Safari/537.36"
          LIMIT: "0"
          SLEEP_SECONDS: "0.3"
        run: |
          python scripts/raspar_detalhes_siagas.py

      - name: Commit dos arquivos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/raw data/processed
          git diff --staged --quiet || git commit -m "Atualização diária dos detalhes SIAGAS"
          git push
