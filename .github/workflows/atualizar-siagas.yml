name: Atualizar dados SIAGAS Paramirim

on:
  workflow_dispatch:
  schedule:
    - cron: "15 06 * * *"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar coleta
        env:
          SIAGAS_BASE_URL: "https://siagasweb.sgb.gov.br"
          SIAGAS_SEARCH_PATH: "layout/pesquisa_coordenada.php"
          SIAGAS_USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/131.0 Safari/537.36"
        run: |
          python scripts/coletar_siagas.py

      - name: Commit dos arquivos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/raw data/processed
          git diff --staged --quiet || git commit -m "Atualização diária SIAGAS Paramirim"
          git push
