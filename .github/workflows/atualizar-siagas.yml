name: Atualizar detalhes SIAGAS

on:
  workflow_dispatch:
  schedule:
    - cron: "20 06 * * *"

permissions:
  contents: write

jobs:
  atualizar-detalhes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar raspagem dos detalhes
        env:
          SIAGAS_BASE_URL: "https://siagasweb.sgb.gov.br"
          SIAGAS_DETAIL_PATH: "layout/detalhe.php"
          SIAGAS_USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/131.0 Safari/537.36"
          LIMIT: "0"
          SLEEP_SECONDS: "0.2"
        run: |
          python scripts/raspar_detalhes_siagas.py

      - name: Preparar pacotes para release
        run: |
          mkdir -p release_assets

          if [ -d "data/processed" ]; then
            cp -r data/processed release_assets/processed
            cd release_assets
            zip -r siagas_processed.zip processed
            cd ..
          fi

          if [ -d "data/raw/imagens_pocos" ]; then
            cp -r data/raw/imagens_pocos release_assets/imagens_pocos
            cd release_assets
            zip -r siagas_imagens_pocos.zip imagens_pocos
            cd ..
          fi

          if [ -d "data/raw/html_pocos" ]; then
            cp -r data/raw/html_pocos release_assets/html_pocos
            cd release_assets
            zip -r siagas_html_pocos.zip html_pocos
            cd ..
          fi

      - name: Criar release se não existir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="siagas-daily-latest"

          gh release view "$TAG" >/dev/null 2>&1 || \
          gh release create "$TAG" \
            --title "SIAGAS Daily Latest" \
            --notes "Release automática com os arquivos mais recentes do scraping do SIAGAS."

      - name: Enviar assets para a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="siagas-daily-latest"

          FILES=""
          [ -f "release_assets/siagas_processed.zip" ] && FILES="$FILES release_assets/siagas_processed.zip"
          [ -f "release_assets/siagas_imagens_pocos.zip" ] && FILES="$FILES release_assets/siagas_imagens_pocos.zip"
          [ -f "release_assets/siagas_html_pocos.zip" ] && FILES="$FILES release_assets/siagas_html_pocos.zip"

          if [ -n "$FILES" ]; then
            gh release upload "$TAG" $FILES --clobber
          else
            echo "Nenhum arquivo encontrado para enviar à release."
          fi
